<!DOCTYPE html>
<html>
<head>
<title>CyberShield AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>CyberShield AI</h1>

<div class="card">
<h2>Signup</h2>
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<div class="card">
<h2>Scan URL</h2>
<input id="url">
<button onclick="scanURL()">Scan</button>
<p id="urlres"></p>
</div>

<div class="card">
<h2>Email Check</h2>
<input id="email2">
<button onclick="checkEmail()">Check</button>
<p id="emailres"></p>
</div>

<div class="card">
<h2>AI Assistant</h2>
<input id="q">
<button onclick="askAI()">Ask</button>
<p id="aires"></p>
</div>

<script src="script.js"></script>

</body>
</html>
